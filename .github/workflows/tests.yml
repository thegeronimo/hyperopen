name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Babashka
        run: |
          BB_VERSION=1.12.197
          curl -sSL -o bb.tar.gz "https://github.com/babashka/babashka/releases/download/v${BB_VERSION}/babashka-${BB_VERSION}-linux-amd64-static.tar.gz"
          tar -xzf bb.tar.gz bb
          mkdir -p "$HOME/.local/bin"
          mv bb "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/bb" --version

      - name: Cache Clojure Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.shadow-cljs
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn', 'shadow-cljs.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Install Dependencies
        run: npm install

      - name: Run CI Test Gate
        run: npm run test:ci

      - name: Run WebSocket Test Gate
        run: npm run test:websocket
